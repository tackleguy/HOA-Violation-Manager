name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify HOAFlow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Project verification
        run: npm run verify

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev

      - name: Start local server
        run: |
          npm run dev -- --hostname 127.0.0.1 > /tmp/hoaflow-next.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/hoaflow-next.log
          exit 1

      - name: Smoke test
        run: npm run smoke
